<style>
  :root {
    --bg:#f4f3ef;--surface:#fff;--surface-alt:#f9f8f5;--border:#e2dfd8;
    --accent:#1a4b6e;--accent-light:#e8f0f7;
    --accent2:#c8702a;--accent2-light:#fdf0e6;
    --green:#1e7a4e;--green-bg:#e8f5ef;
    --orange:#b05b00;--orange-bg:#fef3e2;
    --red:#b92b2b;--red-bg:#fdeaea;
    --purple:#6b21a8;--purple-bg:#f3e8ff;
    --teal:#0f766e;--teal-bg:#ccfbf1;
    --text:#1c1c1c;--text-muted:#6b6b6b;
    --radius:8px;--shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);--shadow-lg:0 8px 32px rgba(0,0,0,.1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
  .shell{display:flex;min-height:100vh}
  .sidebar{width:242px;background:var(--accent);color:#fff;display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px}
  .topbar-left{display:flex;align-items:center;gap:12px}
  .topbar-title h1{font-family:'DM Serif Display',serif;font-size:22px;color:var(--accent)}
  .topbar-title p{font-size:12.5px;color:var(--text-muted);margin-top:1px}
  .topbar-actions{display:flex;gap:8px;align-items:center}
  .content{flex:1;overflow:auto}

  /* Layout paramétrage : nav verticale + corps */
  .param-layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 56px)}
  .param-nav{border-right:1px solid var(--border);background:var(--surface);padding:12px 0;position:sticky;top:0;height:calc(100vh - 56px);overflow-y:auto}
  .param-nav-group{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted);font-weight:600;padding:14px 18px 6px}
  .param-link{display:flex;align-items:center;gap:10px;padding:9px 18px;font-size:13px;color:var(--text-muted);cursor:pointer;border-left:3px solid transparent;transition:all .12s}
  .param-link:hover{background:var(--surface-alt);color:var(--text)}
  .param-link.active{background:var(--accent-light);color:var(--accent);border-left-color:var(--accent);font-weight:600}
  .param-link .ic{font-size:15px;width:20px;text-align:center}

  .param-body{padding:28px 32px;max-width:920px}
  .panel{display:none}
  .panel.active{display:block;animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .panel-head{margin-bottom:18px}
  .panel-title{font-family:'DM Serif Display',serif;font-size:24px;color:var(--accent)}
  .panel-sub{font-size:13px;color:var(--text-muted);margin-top:3px}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden}
  .card-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .card-head h3{font-size:14px;font-weight:600;color:var(--text)}
  .card-head .sub{font-size:12px;color:var(--text-muted);margin-top:1px}
  .card-body{padding:18px}

  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .form-group{display:flex;flex-direction:column;gap:4px}
  .form-group.full{grid-column:1/-1}
  label{font-size:12px;font-weight:500;color:var(--text-muted)}
  .modal{background:var(--surface);border-radius:12px;box-shadow:var(--shadow-lg);max-height:92vh;overflow-y:auto;animation:slideUp .2s ease}
  .modal-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .modal-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--accent)}
  @keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  input,select,textarea{border:1px solid var(--border);border-radius:6px;padding:8px 11px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s;width:100%}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
  input[readonly]{background:var(--surface-alt);color:var(--text-muted)}
  .hint{font-size:11px;color:var(--text-muted)}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:9px 12px;background:var(--surface-alt);font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--text-muted);font-weight:600;border-bottom:1px solid var(--border)}
  td{padding:9px 12px;border-bottom:1px solid var(--border)}
  tr:last-child td{border-bottom:none}
  .mono{font-family:monospace;font-size:12px;background:var(--accent-light);color:var(--accent);padding:1px 6px;border-radius:4px;font-weight:600}

  .btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:#163d5a}
  .btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text)}
  .btn-secondary:hover{background:var(--surface-alt)}
  .btn-danger{background:var(--red-bg);color:var(--red);border:1px solid #f0c0c0}
  .btn-sm{padding:5px 10px;font-size:12px}

  .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
  .b-on{background:var(--green-bg);color:var(--green)}
  .b-off{background:#f0f0f0;color:#777}
  .b-warn{background:var(--orange-bg);color:var(--orange)}

  /* Toggle */
  .switch{position:relative;display:inline-block;width:42px;height:23px;flex-shrink:0}
  .switch input{opacity:0;width:0;height:0}
  .slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:23px;transition:.2s}
  .slider:before{content:"";position:absolute;height:17px;width:17px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
  .switch input:checked+.slider{background:var(--green)}
  .switch input:checked+.slider:before{transform:translateX(19px)}
  .row-toggle{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}
  .row-toggle:last-child{border-bottom:none}
  .rt-label{font-size:13px;font-weight:500}
  .rt-sub{font-size:11.5px;color:var(--text-muted);margin-top:1px}

  /* Matrice permissions */
  .matrix th, .matrix td{text-align:center}
  .matrix th:first-child, .matrix td:first-child{text-align:left}
  .matrix input{width:auto}

  .save-bar{display:flex;justify-content:flex-end;gap:8px;margin-top:6px}
  .info-strip{background:var(--accent-light);border:1px solid #c0d8ea;color:var(--accent);border-radius:var(--radius);padding:10px 14px;font-size:12.5px;margin-bottom:18px;display:flex;gap:8px;align-items:center}

  .toast-container{position:fixed;top:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:999}
  .toast{background:var(--text);color:#fff;padding:11px 16px;border-radius:8px;font-size:13px;box-shadow:var(--shadow-lg);animation:tin .25s ease,tout .3s ease 2.5s forwards}
  .toast.success{background:var(--green)}.toast.error{background:var(--red)}.toast.warn{background:var(--orange)}
  @keyframes tin{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
  @keyframes tout{to{opacity:0;transform:translateX(30px)}}

  @media(max-width:860px){.param-layout{grid-template-columns:1fr}.param-nav{position:static;height:auto;display:flex;overflow-x:auto;border-right:none;border-bottom:1px solid var(--border)}.form-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title"><h1>Paramétrage</h1><p>Configuration de l'établissement et du système</p></div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-secondary btn-sm" onclick="exportConfig()">⬇ Config</button>
        <button class="btn btn-primary btn-sm" onclick="exportTout()" title="Exporter TOUTES les données (patients, factures, stock…)">⬇ Sauvegarde complète</button>
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('import-file').click()">⬆ Importer</button>
        <input type="file" id="import-file" accept="application/json" style="display:none" onchange="importConfig(this)">
      </div>
    </div>
    <div class="content">
      <div class="param-layout">
        <nav class="param-nav" id="param-nav"></nav>
        <div class="param-body" id="param-body"></div>
      </div>
    </div>
  </div>
</div>
<div class="toast-container" id="toast-container"></div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// MODULE PARAMÉTRAGE — Configuration ERP (offline-first, localStorage)
// ══════════════════════════════════════════════════════════════════════════════
const CFG_KEY = 'medicore_parametrage';

// ── Configuration par défaut (Côte d'Ivoire / OHADA) ──────────────────────────
const DEFAULT_CFG = {
  etablissement: {
    nom:'CHU MediCore', type:'Centre Hospitalier Universitaire', agrement:'CI-SAN-2019-0427',
    rccm:'CI-ABJ-2019-B-12345', ncc:'1942567 X', adresse:'Boulevard de la Santé, Cocody',
    ville:'Abidjan', tel:'+225 27 22 44 55 66', email:'contact@medicore.ci',
    directeur:'Pr. KOUADIO N\'Guessan', devise:'FCFA (XOF)', exercice:'2025', tva:'18'
  },
  numerotation: {
    dossier:'D2058##', ipp:'IPP-######', facture:'FAC-AAAA-####',
    of:'OF-AAAA-###', bc:'BC-AAAA-###', ecriture:'EC-MM-####'
  },
  securite: {
    longueurMin:8, majuscule:true, chiffre:true, special:true, expiration:90,
    tentativesMax:5, dureeSession:30, twofa:true
  },
  sauvegarde: { auto:true, frequence:'quotidienne', heure:'02:00', retention:30, dernier:'2025-06-12 02:00' },
  integrations: {
    wave:{actif:true, marchand:'M-WAVE-77881'},
    orange:{actif:true, marchand:'OM-CI-55214'},
    mtn:{actif:false, marchand:''},
    whatsapp:{actif:true, numero:'+225 07 00 00 00 00', token:'••••••••••'},
    sms:{actif:true, gateway:'LeTexto / Orange SMS Pro'},
    smtp:{actif:true, serveur:'smtp.medicore.ci', port:'587'}
  },
  seuils: { stockMini:20, peremptionJours:60, valeurCritiqueLabo:true, delaiResultat:30, tauxOccupationAlerte:90, delaiArchivageJours:90 }
};

// Comptes utilisateurs : gérés par MEDICORE_USERS (store 'utilisateurs', mots de
// passe SHA-256+sel). Voir medicore-users.js.

let SERVICES = [
  { nom:'Médecine générale', code:'MED', pole:'Médecine',  responsable:'Dr. COULIBALY Seydou', lits:24 },
  { nom:'Chirurgie',         code:'CHI', pole:'Chirurgie', responsable:'Dr. TOURÉ Mamadou',    lits:18 },
  { nom:'Maternité',         code:'MAT', pole:'Mère-Enfant', responsable:'Dr. BAMBA Aïcha',    lits:16 },
  { nom:'Urgences',          code:'URG', pole:'Urgences',  responsable:'Dr. DIABATÉ Oumar',    lits:8  },
  { nom:'Laboratoire',       code:'LAB', pole:'Plateau technique', responsable:'DOSSO Ramatou', lits:0 },
];

let TARIFS = [
  { libelle:'Consultation médecine générale', code:'C-MED', tarif:8000 },
  { libelle:'Consultation spécialisée',       code:'C-SPE', tarif:12000 },
  { libelle:'Consultation urgences',          code:'C-URG', tarif:7500 },
  { libelle:'Analyse biologique standard',    code:'B-STD', tarif:4500 },
  { libelle:'Échographie',                    code:'I-ECHO', tarif:25000 },
  { libelle:'Hospitalisation / jour',         code:'H-JOUR', tarif:15000 },
];

let ASSURANCES = [
  { nom:'CNAM — Assurance Maladie', taux:70, statut:'Conventionné' },
  { nom:'Mutuelle complémentaire',  taux:80, statut:'Conventionné' },
  { nom:'Assurance privée',         taux:90, statut:'Conventionné' },
  { nom:'Patient payant',           taux:0,  statut:'—' },
];

let BANQUES = [
  { nom:'BGFIBANK CI', compte:'511', rib:'CI93 BGFI 0001 2345 6789', solde:72000000 },
  { nom:'ECOBANK CI',  compte:'512', rib:'CI28 ECOB 0009 8765 4321', solde:48000000 },
  { nom:'BNI CI',      compte:'513', rib:'CI11 BNIC 0004 5612 3098', solde:40000000 },
];

let FOURNISSEURS = [
  { nom:'LABOREX CI',        categorie:'Produits pharmaceutiques', ncc:'CI-9912345', delai:'15 j' },
  { nom:'COPHARMED',         categorie:'Consommables médicaux',    ncc:'CI-8823416', delai:'7 j'  },
  { nom:'Air Liquide CI',    categorie:'Gaz médicaux',             ncc:'CI-7734821', delai:'3 j'  },
  { nom:'SODICI Matériel',   categorie:'Matériel biomédical',      ncc:'CI-6645213', delai:'30 j' },
];

// Copies immuables pour la réinitialisation
const DEFAULT_SERVICES    = JSON.parse(JSON.stringify(SERVICES));
const DEFAULT_TARIFS      = JSON.parse(JSON.stringify(TARIFS));
const DEFAULT_FOURNISSEURS= JSON.parse(JSON.stringify(FOURNISSEURS));

const MODULES_PERM = ['Facturation','Comptabilité','Pharmacie','Laboratoire','Bloc','DPI','RH','Paramétrage'];
const ROLES_PERM = ['Administrateur','Direction','Médecin','Infirmier','Pharmacien','Laborantin','Caissier','Comptable','RH','Archiviste'];
let PERMISSIONS = {
  'Administrateur': {Facturation:1,'Comptabilité':1,Pharmacie:1,Laboratoire:1,Bloc:1,DPI:1,RH:1,'Paramétrage':1},
  'Médecin':       {Facturation:1,'Comptabilité':0,Pharmacie:0,Laboratoire:1,Bloc:1,DPI:1,RH:0,'Paramétrage':0},
  'Pharmacien':    {Facturation:1,'Comptabilité':0,Pharmacie:1,Laboratoire:0,Bloc:0,DPI:1,RH:0,'Paramétrage':0},
  'DAF':           {Facturation:1,'Comptabilité':1,Pharmacie:0,Laboratoire:0,Bloc:0,DPI:0,RH:1,'Paramétrage':0},
};

let CFG = JSON.parse(JSON.stringify(DEFAULT_CFG));

function loadConfig(){
  // Compatibilité : lire d'abord via MEDICORE_STORE (nouveau format v2),
  // puis fallback sur l'ancienne clé directe si nécessaire.
  try {
    let saved = null;
    if(typeof MEDICORE_STORE !== 'undefined'){
      saved = MEDICORE_STORE.load('parametrage', null);
    }
    if(!saved){
      // Fallback lecture directe (données pré-migration)
      const raw = localStorage.getItem(CFG_KEY);
      if(raw) saved = JSON.parse(raw);
    }
    if(saved){
      CFG = Object.assign(JSON.parse(JSON.stringify(DEFAULT_CFG)), saved.cfg||{});
      if(saved.services)     SERVICES     = saved.services;
      if(saved.tarifs)       TARIFS       = saved.tarifs;
      if(saved.fournisseurs) FOURNISSEURS = saved.fournisseurs;
      if(saved.banques)      BANQUES      = saved.banques;
      if(saved.permissions)  PERMISSIONS  = saved.permissions;
    }
  } catch(e){}
}
function persist(){
  const payload = { cfg:CFG, services:SERVICES,
    tarifs:TARIFS, fournisseurs:FOURNISSEURS, banques:BANQUES, permissions:PERMISSIONS };
  if(typeof MEDICORE_STORE !== 'undefined'){
    MEDICORE_STORE.save('parametrage', payload, true); // immediate = true (config critique)
  } else {
    try{ localStorage.setItem(CFG_KEY, JSON.stringify(payload)); }catch(e){}
  }
}

// ── Sections ──────────────────────────────────────────────────────────────────
const SECTIONS = [
  { id:'etablissement', ic:'🏥', label:'Établissement', groupe:'Général' },
  { id:'utilisateurs',  ic:'👥', label:'Utilisateurs & rôles', groupe:'Général' },
  { id:'services',      ic:'🏛', label:'Services & lits', groupe:'Organisation' },
  { id:'tarification',  ic:'💳', label:'Tarification & assurances', groupe:'Organisation' },
  { id:'comptabilite',  ic:'📊', label:'Comptabilité & banques', groupe:'Organisation' },
  { id:'fournisseurs',  ic:'🚚', label:'Fournisseurs', groupe:'Organisation' },
  { id:'stock',         ic:'📦', label:'Stock & Catalogue', groupe:'Organisation' },
  { id:'numerotation',  ic:'🔢', label:'Numérotation', groupe:'Système' },
  { id:'seuils',        ic:'🔔', label:'Alertes & seuils', groupe:'Système' },
  { id:'integrations',  ic:'🔌', label:'Intégrations', groupe:'Système' },
  { id:'securite',      ic:'🔒', label:'Sécurité & sauvegardes', groupe:'Système' },
  { id:'cloud',         ic:'☁️',  label:'Cloud & Synchro',            groupe:'Système' },
  { id:'import',        ic:'📥', label:'Import CSV',                 groupe:'Système' },
  { id:'donnees',       ic:'🗑', label:'Données & réinitialisation', groupe:'Système' },
];

let currentSection = 'etablissement';

function renderNav(){
  const groups = [...new Set(SECTIONS.map(s=>s.groupe))];
  document.getElementById('param-nav').innerHTML = groups.map(g=>
    `<div class="param-nav-group">${g}</div>` +
    SECTIONS.filter(s=>s.groupe===g).map(s=>
      `<div class="param-link ${s.id===currentSection?'active':''}" onclick="switchSection('${s.id}')">
        <span class="ic">${s.ic}</span>${s.label}</div>`).join('')
  ).join('');
}

function switchSection(id){ currentSection=id; renderNav(); renderBody(); }

function field(label, id, val, type, hint){
  return `<div class="form-group"><label>${label}</label>
    <input type="${type||'text'}" id="${id}" value="${val!=null?String(val).replace(/"/g,'&quot;'):''}">
    ${hint?`<span class="hint">${hint}</span>`:''}</div>`;
}
function fmt(n){ return Number(n).toLocaleString('fr-FR'); }

function renderBody(){
  const b = document.getElementById('param-body');
  if(currentSection==='etablissement'){
    const e=CFG.etablissement;
    b.innerHTML = head('Établissement','Identité et informations légales de la structure')+
    `<div class="card"><div class="card-head"><div><h3>Identité</h3><div class="sub">Apparaît sur les factures, rapports et documents officiels</div></div></div>
      <div class="card-body"><div class="form-grid">
        ${field('Nom de l\'établissement','e-nom',e.nom)}
        ${field('Type','e-type',e.type)}
        ${field('N° d\'agrément (Ministère Santé)','e-agrement',e.agrement)}
        ${field('RCCM','e-rccm',e.rccm)}
        ${field('N° Compte Contribuable (NCC)','e-ncc',e.ncc)}
        ${field('Directeur','e-directeur',e.directeur)}
        ${field('Adresse','e-adresse',e.adresse)}
        ${field('Ville','e-ville',e.ville)}
        ${field('Téléphone','e-tel',e.tel,'tel')}
        ${field('Email','e-email',e.email,'email')}
        ${field('Devise','e-devise',e.devise,'text','Zone UEMOA — non modifiable en production')}
        ${field('Exercice comptable','e-exercice',e.exercice)}
        ${field('Taux TVA (%)','e-tva',e.tva,'number')}
      </div>
      <div class="save-bar"><button class="btn btn-primary" onclick="saveEtab()">💾 Enregistrer</button></div>
      </div></div>`;
  }
  else if(currentSection==='utilisateurs'){
    if(typeof MEDICORE_USERS==='undefined'){
      b.innerHTML = head('Utilisateurs & rôles','Comptes, authentification et droits d\'accès par module')+
        `<div class="card"><div class="card-body" style="padding:20px;color:var(--text-muted)">Module de gestion des utilisateurs non chargé. Vérifiez que <span class="mono">medicore-users.js</span> est bien déployé, puis rechargez la page (Ctrl+F5).</div></div>`;
      return;
    }
    const ulist=MEDICORE_USERS.liste();
    b.innerHTML = head('Utilisateurs & rôles','Comptes, authentification et droits d\'accès par module')+
    `<div class="card"><div class="card-head"><div><h3>Comptes utilisateurs</h3><div class="sub">${ulist.filter(u=>u.actif).length} actif(s) sur ${ulist.length} — mots de passe chiffrés (SHA-256+sel)</div></div>
      <button class="btn btn-primary btn-sm" onclick="addUser()">＋ Ajouter</button></div>
      <div class="card-body" style="padding:0"><table><thead><tr><th>Identifiant</th><th>Nom</th><th>Contact</th><th>Service</th><th>Rôle</th><th>2FA</th><th>Statut</th><th></th></tr></thead>

// ── Helper : formulaire modal générique ────────────────────────────────────────
function formModal(titre, champs, onOk){
  let ov=document.getElementById('_fm-ov'); if(ov) ov.remove();
  ov=document.createElement('div'); ov.id='_fm-ov';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px';
  ov.onclick=e=>{ if(e.target===ov) ov.remove(); };
  const inputs=champs.map(c=>{
    const id='fm-'+c.key;
    let inp, help='';
    if(c.type==='select'){
      const opts=c.options.map(o=>{
        const label=typeof o==='object'?o.label:o;
        const titre=typeof o==='object'&&o.desc?` title="${o.desc.replace(/"/g,'&quot;')}"`:'';
        return `<option value="${label}"${label===c.value?' selected':''}${titre}>${label}</option>`;
      }).join('');
      inp=`<select id="${id}" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px">${opts}</select>`;
      // Aide contextuelle sous le select (description du rôle sélectionné)
      if(c.options.some(o=>typeof o==='object'&&o.desc)){
        const descs={}; c.options.forEach(o=>{ if(typeof o==='object') descs[o.label]=o.desc; });
        inp+=`<div id="${id}-help" style="font-size:11.5px;color:var(--text-muted);margin-top:3px">${descs[c.value]||''}</div>`;
        inp=inp.replace(`id="${id}"`, `id="${id}" data-descs='${JSON.stringify(descs).replace(/'/g,"&apos;")}' onchange="document.getElementById('${id}-help').textContent=(JSON.parse(this.dataset.descs)[this.value]||'')"`);
      }
    } else {
      const list=c.suggestions?` list="${id}-list"`:'';
      inp=`<input id="${id}" type="${c.type||'text'}"${c.type==='number'?' step="any"':''} value="${c.value!=null?c.value:''}" placeholder="${c.placeholder||''}"${list} style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;box-sizing:border-box">`;
      if(c.suggestions) inp+=`<datalist id="${id}-list">${c.suggestions.map(s=>`<option value="${s}">`).join('')}</datalist>`;
    }
    return `<div><label style="display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:3px">${c.label}${c.required?' *':''}${c.sub?` <span style="font-weight:400">(${c.sub})</span>`:''}</label>${inp}</div>`;
  }).join('');
  ov.innerHTML=`<div class="modal" style="width:460px">
    <div class="modal-header"><div><div class="modal-title">${titre}</div></div>
      <button onclick="document.getElementById('_fm-ov').remove()" style="border:none;background:none;font-size:20px;cursor:pointer;color:var(--text-muted)">✕</button></div>
    <div style="padding:18px 24px;display:grid;gap:11px">${inputs}</div>
    <div style="padding:0 24px 20px;display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="document.getElementById('_fm-ov').remove()">Annuler</button>
      <button class="btn btn-primary" id="fm-ok">Enregistrer</button></div></div>`;
  document.body.appendChild(ov);
  document.getElementById('fm-ok').onclick=()=>{
    const vals={}; let manque=null;
    champs.forEach(c=>{ const el=document.getElementById('fm-'+c.key); let v=el?el.value:''; if(c.type==='number') v=v===''?0:parseFloat(v); if(c.required && (v===''||v==null)) manque=manque||c.label; vals[c.key]=v; });
    if(manque){ toast(manque+' requis.','error'); return; }
    ov.remove(); onOk(vals);
  };
  setTimeout(()=>{ const f=ov.querySelector('input,select'); if(f) f.focus(); },50);
}

}
function serviceSuggestions(){ return SERVICES.map(s=>s.nom); }
function addUser(){
  const ro=roleOptions();
  formModal('Nouvel utilisateur',[
    {key:'login',label:'Identifiant',required:true,placeholder:'ex : j.kessie',sub:'minuscules, sans espace'},
    {key:'nom',label:'Nom complet',placeholder:'ex : KESSIE Jean'},
    {key:'email',label:'Email',type:'email',placeholder:'ex : j.kessie@hopital.ci',sub:'pour notifications & réinitialisation'},
    {key:'telephone',label:'Téléphone / WhatsApp',placeholder:'ex : +225 07 00 00 00 00',sub:'format international'},
    {key:'service',label:'Service / poste',placeholder:'ex : Laboratoire',suggestions:serviceSuggestions()},
    {key:'role',label:'Rôle',type:'select',options:ro,value:'Médecin'},
  ], async v=>{
    if(v.email && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(v.email)){ toast('Email invalide.','error'); return; }
    const role=ro.find(r=>r.label===v.role)?.k||'archiviste';

    renderBody();

function supprimerTout(){
  if(!confirm('⚠️ REMISE À ZÉRO COMPLÈTE\n\nToutes les données MediCore seront effacées de ce navigateur.\nLa session de connexion sera préservée.\n\nConfirmer ?')) return;
  // ── Arrêter la sync auto pour éviter un re-pull depuis Supabase ──
  let syncReprise=false;
  if(typeof MEDICORE_SYNC!=='undefined' && MEDICORE_SYNC.isAuto && MEDICORE_SYNC.isAuto()){
    syncReprise=true; MEDICORE_SYNC.stopAuto();
  }
  const keysToDelete = [];
  for(let i=0; i<localStorage.length; i++){
    const k = localStorage.key(i);
    if(k && k.startsWith('medicore_') && !CLES_PRESERVEES.includes(k)){
      keysToDelete.push(k);
    }
  }
  keysToDelete.forEach(k => { try{ localStorage.removeItem(k); }catch(e){} });
  // Invalider le cache mémoire MEDICORE_STORE
  if(typeof MEDICORE_STORE !== 'undefined'){ MEDICORE_STORE._mem = {}; MEDICORE_STORE._kpiCache = null; }
  if(typeof MEDICORE_BUS   !== 'undefined'){ MEDICORE_BUS._cache = null; MEDICORE_BUS._counts = null; }
  // ── Reset des deltas de sync (sinon le prochain pull ré-importe le cloud) ──
  if(typeof MEDICORE_SYNC!=='undefined' && MEDICORE_SYNC.resetDeltas) MEDICORE_SYNC.resetDeltas();
  // Réinitialiser les tableaux en mémoire avec les valeurs par défaut
  CFG = JSON.parse(JSON.stringify(DEFAULT_CFG));
  SERVICES = JSON.parse(JSON.stringify(DEFAULT_SERVICES));
  TARIFS = JSON.parse(JSON.stringify(DEFAULT_TARIFS));
  FOURNISSEURS = JSON.parse(JSON.stringify(DEFAULT_FOURNISSEURS));
  persist();
  const avis = syncReprise ? '\n\n⚠ La sync cloud a été suspendue. Videz aussi Supabase (bouton ☁) sinon les données reviendront.' : '';
  toast('Remise à zéro effectuée — '+keysToDelete.length+' entrée(s) supprimée(s).'+(syncReprise?' Sync suspendue.':''),'success');
  if(syncReprise) alert('Remise à zéro locale effectuée.'+avis);
  setTimeout(()=>renderBody(), 300);
}

function lireFichierCSV(file){
  const reader = new FileReader();

  };
  reader.onerror = function(){ toast('Impossible de lire le fichier.','error'); };
  reader.readAsText(file, 'UTF-8');
}

// Parser CSV robuste (gère guillemets, virgules dans champs)
function parserCSV(texte){
  const lignes = texte.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l=>l.trim()!=='');
  return lignes.map(ligne=>{
    const champs=[]; let cur=''; let dansGuillemets=false;
    for(let i=0;i<ligne.length;i++){
      const c=ligne[i];
      if(c==='"'){
        if(dansGuillemets && ligne[i+1]==='"'){ cur+='"'; i++; }
        else dansGuillemets=!dansGuillemets;
      } else if(c===',' && !dansGuillemets){ champs.push(cur); cur=''; }
      else cur+=c;
    }
    champs.push(cur);
    return champs.map(x=>x.trim());
  });
}

function parserEtPrevisualiser(texte, moduleId){
  const m = IMPORT_MODULES.find(x=>x.id===moduleId); if(!m) return;
  const rows = parserCSV(texte);
  if(rows.length<2){ toast('Fichier vide ou sans données.','error'); return; }

  const entetes = rows[0].map(h=>h.toLowerCase().replace(/^\ufeff/,''));
  const donnees = rows.slice(1);

  // Vérifier colonnes requises présentes
  const manquants = m.requis.filter(r=>!entetes.includes(r.toLowerCase()));
  if(manquants.length){
    toast('Colonnes requises manquantes : '+manquants.join(', '),'error');
    return;
  }

  // Mapper chaque ligne en objet
  const objets = donnees.map(ligne=>{
    const obj={};
    entetes.forEach((h,i)=>{ if(m.champs.includes(h)) obj[h]=ligne[i]||''; });
    return obj;
  }).filter(o=>m.requis.every(r=>o[r] && o[r].trim()!==''));

  const rejetes = donnees.length - objets.length;

  // Aperçu HTML
  const apercu = objets.slice(0,5);
  let html = '<div class="card" style="margin-top:18px;border:2px solid var(--accent,#1a4b6e)"><div class="card-head"><div>' +
    '<h3>📥 Aperçu import — '+m.label+'</h3>' +
    '<div class="sub">'+objets.length+' ligne(s) valide(s)'+(rejetes>0?' · '+rejetes+' rejetée(s) (champ requis vide)':'')+'</div></div></div>' +
    '<div class="card-body" style="padding:0;overflow-x:auto"><table><thead><tr>' +
    Object.keys(apercu[0]||{}).map(k=>'<th>'+k+'</th>').join('') +
    '</tr></thead><tbody>' +
    apercu.map(o=>'<tr>'+Object.values(o).map(v=>'<td style="font-size:12px">'+(v||'—')+'</td>').join('')+'</tr>').join('') +
    '</tbody></table>' +
    (objets.length>5?'<div style="padding:8px 12px;font-size:11.5px;color:var(--text-muted)">… et '+(objets.length-5)+' autre(s) ligne(s)</div>':'') +
    '</div>' +
    '<div class="card-body" style="border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap">' +
    '<label style="display:flex;align-items:center;gap:6px;font-size:12.5px;margin-right:auto">' +
    '<input type="checkbox" id="import-remplacer"> Remplacer les données existantes (sinon ajout)</label>' +
    '<button class="btn btn-secondary" onclick="document.getElementById(\'import-preview\').innerHTML=\'\'">Annuler</button>' +
    '<button class="btn btn-primary" onclick=\'confirmerImport("'+moduleId+'")\'>✓ Confirmer l\'import ('+objets.length+')</button>' +
    '</div></div>';

  document.getElementById('import-preview').innerHTML = html;
  window._importDonnees = objets;
  // Scroll vers aperçu
  setTimeout(()=>document.getElementById('import-preview').scrollIntoView({behavior:'smooth'}),100);
}

function confirmerImport(moduleId){
  const m = IMPORT_MODULES.find(x=>x.id===moduleId); if(!m) return;
  const objets = window._importDonnees||[];
  if(!objets.length){ toast('Aucune donnée à importer.','error'); return; }
  const remplacer = document.getElementById('import-remplacer').checked;

  // Générer ID auto si absent
  objets.forEach((o,i)=>{ if(!o.id) o.id = m.id.toUpperCase().slice(0,3)+Date.now().toString(36)+i; });

  let existant=[];
  try{ existant = JSON.parse(localStorage.getItem(m.lsKey)||'[]'); if(!Array.isArray(existant)) existant=[]; }catch(e){}

  const final = remplacer ? objets : existant.concat(objets);

  // Sauvegarde via MEDICORE_STORE si dispo (respecte sync), sinon localStorage direct
  const storeKey = m.lsKey.replace(/^medicore_/,'');
  if(typeof MEDICORE_STORE!=='undefined' && MEDICORE_STORE.save){
    MEDICORE_STORE.save(storeKey, final, true);
  } else {
    localStorage.setItem(m.lsKey, JSON.stringify(final));
  }

  if(typeof MEDICORE_AUDIT!=='undefined') MEDICORE_AUDIT.log('Import CSV','IMPORT',m.label+' : '+objets.length+' ligne(s)'+(remplacer?' (remplacement)':' (ajout)'));

  toast(objets.length+' ligne(s) importée(s) dans '+m.label+(remplacer?' (remplacées)':' (ajoutées)')+'.','success');
  document.getElementById('import-preview').innerHTML='';
  window._importDonnees=null;
  setTimeout(()=>renderBody(),400);
}

// ── PURGE SUPABASE : vide toutes les tables cloud ─────────────────────────────
async function viderSupabase(){
  const creds = getSBCreds();
  if(!creds.url || !creds.key){ toast('Supabase non configuré. Onglet « Synchronisation Cloud ».','error'); return; }
  if(!confirm('⛔ VIDER LA BASE SUPABASE (CLOUD)\n\nToutes les tables seront effacées sur le serveur :\n• Patients, prescriptions, résultats\n• Factures, écritures, trésorerie\n• Stock, RH, immobilisations, audit\n\nIRRÉVERSIBLE — affecte TOUS les postes connectés.\n\nConfirmer ?')) return;
  if(!confirm('Dernière confirmation — vider la base CLOUD pour de bon ?')) return;

  const TABLES = [
    // Ordre : enfants avant parents (FK)
    'resultats_labo','demandes_labo','demandes_imagerie','interventions','prescriptions','sejours','patients',
    'mouvements_stock','produits',
    'lignes_facture','factures',
    'ecritures_analytiques','ecritures','centres_cout',
    'mouvements_tresorerie','comptes_tresorerie',
    'dotations_amortissement','immobilisations',
    'lignes_commande','commandes_achat','fournisseurs',
    'bulletins_paie','conges','personnel',
    'audit_log','bus_evenements','medicore_sync_docs',
  ];

  const headers = { 'apikey':creds.key, 'Authorization':'Bearer '+creds.key, 'Content-Type':'application/json', 'Prefer':'return=minimal' };
  let ok=0, ko=0; const log=[];
  toast('Purge Supabase en cours…','info');

  for(const t of TABLES){
    try{
      // DELETE avec filtre toujours-vrai (id non null) pour purge totale
      const r = await fetch(`${creds.url}/rest/v1/${t}?id=not.is.null`, { method:'DELETE', headers });
      if(r.ok || r.status===404){ ok++; log.push('✓ '+t); }
      else { ko++; log.push('✕ '+t+' ('+r.status+')'); }
    }catch(e){ ko++; log.push('✕ '+t+' — '+e.message); }
  }

  const msg = `Purge Supabase : ${ok} table(s) vidée(s)`+(ko?`, ${ko} échec(s)`:'');
  toast(msg, ko?'warn':'success');
  console.log('[PURGE SUPABASE]\n'+log.join('\n'));
  alert(msg+'\n\nDétail :\n'+log.join('\n'));
}

// ── PURGE TOTALE : Supabase + localStorage en une action ──────────────────────
async function reinitialisationTotale(){
  if(!confirm('🔥 RÉINITIALISATION TOTALE DE L\'ERP\n\nVide À LA FOIS :\n• La base Supabase (cloud, tous postes)\n• Le stockage local de ce navigateur\n\nIRRÉVERSIBLE.\n\nConfirmer ?')) return;
  if(!confirm('Êtes-vous absolument certain ? Cette action efface TOUT.')) return;
  // Suspendre la sync pendant l'opération
  if(typeof MEDICORE_SYNC!=='undefined' && MEDICORE_SYNC.stopAuto) MEDICORE_SYNC.stopAuto();
  await viderSupabase();
  // Puis localStorage (sans reconfirmation)
  const keysToDelete = [];
  for(let i=0; i<localStorage.length; i++){
    const k = localStorage.key(i);
    if(k && k.startsWith('medicore_') && !CLES_PRESERVEES.includes(k)) keysToDelete.push(k);
  }
  keysToDelete.forEach(k => { try{ localStorage.removeItem(k); }catch(e){} });
  if(typeof MEDICORE_STORE !== 'undefined'){ MEDICORE_STORE._mem = {}; MEDICORE_STORE._kpiCache = null; }
  if(typeof MEDICORE_BUS   !== 'undefined'){ MEDICORE_BUS._cache = null; MEDICORE_BUS._counts = null; }
  // Reset deltas : le prochain pull ne ré-importe rien (cloud désormais vide)
  if(typeof MEDICORE_SYNC!=='undefined' && MEDICORE_SYNC.resetDeltas) MEDICORE_SYNC.resetDeltas();
  CFG = JSON.parse(JSON.stringify(DEFAULT_CFG));
  SERVICES = JSON.parse(JSON.stringify(DEFAULT_SERVICES));
  TARIFS = JSON.parse(JSON.stringify(DEFAULT_TARIFS));
  FOURNISSEURS = JSON.parse(JSON.stringify(DEFAULT_FOURNISSEURS));
  persist();
  // Reprendre la sync (cloud vide → rien ne revient)
  if(typeof MEDICORE_SYNC!=='undefined' && MEDICORE_SYNC.startAuto && localStorage.getItem('medicore_sync_auto')!=='0'){
    setTimeout(()=>{ try{ MEDICORE_SYNC.startAuto(); }catch(e){} }, 1000);
  }
  toast('Réinitialisation totale terminée (cloud + local).','success');
  setTimeout(()=>renderBody(), 400);
}

// ── Ping Supabase via moteur ──────────────────────────────────────────────────
async function pingSupa(){
  const badge = document.getElementById('sb-ping-badge');
  const latEl = document.getElementById('sb-latence');
  if(!badge) return;
  if(!MEDICORE_SYNC.configured()){
    badge.className='sb-badge sb-badge-warn'; badge.textContent='Non configuré'; return;
  }
  badge.className='sb-badge sb-badge-pending'; badge.textContent='Test…';
  try{
    const ms = await MEDICORE_SYNC.ping();
    badge.className='sb-badge sb-badge-ok'; badge.textContent='Connecté';
    if(latEl) latEl.textContent=ms+' ms';
  }catch(e){
    badge.className='sb-badge sb-badge-err'; badge.textContent='Erreur';
    if(latEl) latEl.textContent='—';
  }
}

// ── Callback progression → journal ────────────────────────────────────────────
function syncProgress(p){
  const ICONS={ok:'✅',error:'❌',pending:'⏳',skip:'⏭'};
  updateLog(p.label, p.status, ICONS[p.status]||'•', p.label, p.msg);
  renderSyncLog();
}

// ── PUSH delta ────────────────────────────────────────────────────────────────
async function syncPush(){
  if(syncState.enCours){ toast('Sync déjà en cours…','warn'); return; }
  if(!MEDICORE_SYNC.configured()){ toast('Configurez Supabase d\'abord.','error'); return; }
  syncState.enCours=true; syncState.log=[]; renderSyncLog(); updateSyncBtn(true);
  try{
    const r = await MEDICORE_SYNC.push(syncProgress);
    refreshSyncMeta();
    toast(r.errors===0
      ? '✅ Envoi terminé — '+r.sent+' ligne(s) modifiée(s).'
      : '⚠️ '+r.errors+' erreur(s) — '+r.sent+' envoyée(s).',
      r.errors===0?'success':'warn');
  }catch(e){ toast('Erreur push : '+e.message,'error'); }
  finally{ syncState.enCours=false; updateSyncBtn(false); renderSyncLog(); }
}

// ── PULL incrémental non destructif ──────────────────────────────────────────
async function syncPull(){
  if(syncState.enCours){ toast('Sync déjà en cours…','warn'); return; }
  if(!MEDICORE_SYNC.configured()){ toast('Configurez Supabase d\'abord.','error'); return; }
  syncState.enCours=true; syncState.log=[]; renderSyncLog(); updateSyncBtn(true);
  try{
    const r = await MEDICORE_SYNC.pull(syncProgress);
    refreshSyncMeta();
    toast(r.errors===0
      ? '✅ Réception terminée — '+r.received+' ligne(s) fusionnée(s).'
      : '⚠️ '+r.errors+' erreur(s) — '+r.received+' reçue(s).',
      r.errors===0?'success':'warn');
  }catch(e){ toast('Erreur pull : '+e.message,'error'); }
  finally{ syncState.enCours=false; updateSyncBtn(false); renderSyncLog(); }
}

// ── SYNC complète ────────────────────────────────────────────────────────────
async function syncFull(){
  if(syncState.enCours){ toast('Sync déjà en cours…','warn'); return; }
  if(!MEDICORE_SYNC.configured()){ toast('Configurez Supabase d\'abord.','error'); return; }
  syncState.enCours=true; syncState.log=[]; renderSyncLog(); updateSyncBtn(true);
  try{
    const r = await MEDICORE_SYNC.sync(syncProgress);
    refreshSyncMeta();
    toast('✅ Sync complète — '+(r.sent||0)+' envoyé(s), '+(r.received||0)+' reçu(s).','success');
  }catch(e){ toast('Erreur sync : '+e.message,'error'); }
  finally{ syncState.enCours=false; updateSyncBtn(false); renderSyncLog(); }
}

// ── Auto-sync toggle ──────────────────────────────────────────────────────────
function toggleAutoSync(){
  if(MEDICORE_SYNC.isAuto()){ MEDICORE_SYNC.stopAuto(); toast('Auto-sync désactivée.','warn'); }
  else{
    if(!MEDICORE_SYNC.configured()){ toast('Configurez Supabase d\'abord.','error'); return; }
    MEDICORE_SYNC.startAuto(); toast('Auto-sync activée (60 s).','success');
  }
  refreshSyncMeta();
}

// ── Rafraîchir badges statut ──────────────────────────────────────────────────
function refreshSyncMeta(){
  const s = MEDICORE_SYNC.status();
  const set=(id,v)=>{ const e=document.getElementById(id); if(e) e.textContent=v; };
  set('sc-pending', s.pending);
  set('sc-last', s.lastSync ? new Date(s.lastSync).toLocaleString('fr-CI') : '—');
  set('sync-last', s.lastSync ? new Date(s.lastSync).toLocaleString('fr-CI') : '—');
  const net=document.getElementById('sync-net');
  if(net){ net.className='sb-badge '+(s.online?'sb-badge-ok':'sb-badge-err'); net.textContent=s.online?'En ligne':'Hors ligne'; }
  const auto=document.getElementById('auto-toggle');
  if(auto){ auto.checked=s.auto; }
  const autoLbl=document.getElementById('auto-state');
  if(autoLbl){ autoLbl.textContent=s.auto?'Activée':'Désactivée'; autoLbl.style.color=s.auto?'#15803d':'var(--text-muted)'; }
}

function addLog(status, ic, label, msg){ syncState.log.push({ id:label, status, ic, label, msg }); }
function updateLog(id, status, ic, label, msg){
  const e=syncState.log.find(x=>x.label===label);
  if(e){ e.status=status; e.ic=ic; e.msg=msg; } else addLog(status, ic, label, msg);
}
function renderSyncLog(){
  const el=document.getElementById('sync-log');
  if(!el || !syncState.log.length) return;
  el.innerHTML=syncState.log.map(e=>`
    <div class="sync-log-row sync-log-${e.status}">
      <span class="sync-log-ic">${e.ic}</span>
      <span class="sync-log-label">${e.label}</span>
      <span class="sync-log-msg">${e.msg}</span>
    </div>`).join('');
}

function afficherUsageStockage(){
  if(typeof MEDICORE_STORE === 'undefined') return;
  const u = MEDICORE_STORE.usage();
  const el = document.getElementById('storage-usage-bar');
  if(!el) return;
  const pct = Math.min(u.pct, 100);
  const color = pct > 80 ? '#b92b2b' : pct > 60 ? '#d97706' : '#2e7d32';
  el.innerHTML =
    '<div style="margin-bottom:6px;font-size:12.5px;color:var(--text-muted)">' +
      '<strong>' + u.usedKB + ' KB</strong> utilisés sur ~5 120 KB — ' + u.pct + '% — ' + u.keys + ' clé(s)</div>' +
    '<div style="background:#e5e7eb;border-radius:4px;height:10px;overflow:hidden">' +
      '<div style="height:10px;border-radius:4px;background:'+color+';width:'+pct+'%;transition:width .4s"></div>' +
    '</div>' +
    (u.alerte ? '<div style="margin-top:6px;color:#b92b2b;font-size:12px">⚠️ Espace faible — pensez à exporter et purger.</div>' : '');
}
function importConfig(input){
  const f = input.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = e => {
    try{
      const d = JSON.parse(e.target.result);
      // ── Format sauvegarde complète (v2 : { _version, keys:{} }) ──────────
      if(d._version && d.keys && typeof MEDICORE_STORE !== 'undefined'){
        if(!confirm('Restaurer une sauvegarde complète ?\n\nCela remplacera TOUTES les données actuelles (patients, factures, stock\u2026)\n\nCette action est irréversible. Continuer ?')) return;
        const n = MEDICORE_STORE.importAll(d);
        loadConfig(); // Recharger CFG depuis le nouveau store
        renderBody();
        setTimeout(afficherUsageStockage, 200);
        toast(n+' module(s) restaurés depuis la sauvegarde complète.', 'success');
        return;
      }
      // ── Format config seulement (v1) ──────────────────────────────────────
      if(d.cfg)   CFG          = Object.assign(JSON.parse(JSON.stringify(DEFAULT_CFG)), d.cfg);
      if(d.services)     SERVICES     = d.services;
      if(d.tarifs)       TARIFS       = d.tarifs;
      if(d.fournisseurs) FOURNISSEURS = d.fournisseurs;
      if(d.permissions)  PERMISSIONS  = d.permissions;
      persist();
      renderBody();
      toast('Configuration importée.','success');
    }catch(err){ toast('Fichier invalide : '+err.message,'error'); }
  };
  r.readAsText(f);
}

function toast(msg,type=''){ const t=document.createElement('div'); t.className='toast '+type; t.textContent=msg; document.getElementById('toast-container').appendChild(t); setTimeout(()=>t.remove(),3000); }

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',function(){
  afficherUsageStockage();
  if(typeof initNav==='function'){
    initNav('parametrage','Paramétrage','Configuration ERP',
      [{label:'Étape 4 — Administration',file:'#'},{label:'Paramétrage',file:''}]);
  }
  loadConfig(); renderNav();
  if(typeof MEDICORE_USERS!=='undefined' && MEDICORE_USERS.seed){ MEDICORE_USERS.seed().then(renderBody); }
  else { renderBody(); }
});
</script>
