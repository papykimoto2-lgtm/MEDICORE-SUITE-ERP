<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MediCore — Agenda RDV</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f3ef;--surface:#fff;--alt:#f9f8f5;--border:#e2dfd8;--accent:#1a4b6e;--accent-light:#e8f0f7;--accent-mid:#2a6090;--accent2:#c8702a;--green:#1e7a4e;--green-bg:#e8f5ef;--orange:#b05b00;--orange-bg:#fef3e2;--red:#b92b2b;--red-bg:#fdeaea;--muted-bg:#eceae4;--text:#1c1c1c;--muted:#6b6b6b;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);--shadow-lg:0 12px 40px rgba(0,0,0,.16)}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
.hdr{background:var(--accent);color:#fff;padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between}
.hdr .b{display:flex;align-items:center;gap:11px}.hdr .ic{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:18px}
.hdr h1{font-family:'DM Serif Display',serif;font-size:17px}.hdr small{font-size:9.5px;opacity:.6;letter-spacing:1px;text-transform:uppercase;display:block}
.btn{padding:8px 14px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-w{background:rgba(255,255,255,.15);color:#fff}.btn-w:hover{background:rgba(255,255,255,.25)}
.btn-pri{background:var(--accent2);color:#fff}.btn-pri:hover{background:#b5611f}
.btn-ghost{background:var(--accent-light);color:var(--accent)}
.toolbar{max-width:1280px;margin:18px auto 0;padding:0 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.nav-day{display:flex;align-items:center;gap:6px}
.nav-day button{width:34px;height:34px;border:1px solid var(--border);background:var(--surface);border-radius:8px;cursor:pointer;font-size:15px}
.nav-day .lbl{font-family:'DM Serif Display',serif;font-size:18px;min-width:230px;text-align:center}
.views{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:9px;overflow:hidden}
.views button{padding:8px 16px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--muted)}
.views button.on{background:var(--accent);color:#fff}
.sp{flex:1}
select.filt{padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;background:var(--surface)}
.stats{max-width:1280px;margin:14px auto 0;padding:0 18px;display:flex;gap:10px;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:8px 15px;box-shadow:var(--shadow);display:flex;align-items:center;gap:9px}
.stat .d{width:9px;height:9px;border-radius:50%}.stat b{font-size:16px;font-family:'DM Serif Display',serif}.stat small{font-size:11px;color:var(--muted);display:block}
.dot-plan{background:var(--accent)}.dot-hon{background:var(--green)}.dot-abs{background:var(--red)}.dot-ann{background:var(--orange)}

.area{max-width:1280px;margin:16px auto;padding:0 18px}

/* JOUR — timeline */
.day-grid{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.hour-row{display:flex;border-bottom:1px solid var(--border);min-height:58px}
.hour-row:last-child{border-bottom:none}
.hour-lbl{width:64px;flex-shrink:0;padding:8px;font-size:12px;color:var(--muted);text-align:right;border-right:1px solid var(--border);font-weight:600}
.hour-slot{flex:1;padding:7px;display:flex;flex-wrap:wrap;gap:7px;align-content:start}
.ev{border-radius:8px;padding:8px 11px;font-size:12.5px;cursor:pointer;border-left:4px solid;min-width:180px;flex:1;max-width:280px;transition:.12s}
.ev:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.ev b{display:block;font-size:13px}.ev small{color:var(--muted);font-size:11.5px;display:block}
.ev.plan{background:var(--accent-light);border-color:var(--accent)}
.ev.hon{background:var(--green-bg);border-color:var(--green)}
.ev.abs{background:var(--red-bg);border-color:var(--red)}
.ev.ann{background:var(--muted-bg);border-color:var(--orange);opacity:.7}
.ev .badge-p{display:inline-block;font-size:9.5px;background:var(--accent2);color:#fff;padding:1px 6px;border-radius:8px;margin-left:5px;vertical-align:middle}
.collide{outline:2px solid var(--red);outline-offset:-2px}
.warn-line{display:none;background:var(--red-bg);color:var(--red);border-radius:8px;padding:9px 12px;font-size:12.5px;font-weight:600;margin-bottom:12px}
.warn-line.show{display:block}

/* SEMAINE */
.week{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
.wcol{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);min-height:180px}
.wcol-h{padding:10px;text-align:center;border-bottom:1px solid var(--border);background:var(--alt)}
.wcol-h b{display:block;font-size:13px}.wcol-h small{font-size:11px;color:var(--muted)}
.wcol-h.today{background:var(--accent);color:#fff}.wcol-h.today small{color:rgba(255,255,255,.8)}
.wcol-body{padding:8px;display:flex;flex-direction:column;gap:6px}
.wev{border-radius:7px;padding:6px 8px;font-size:11.5px;cursor:pointer;border-left:3px solid}
.wev b{display:block;font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wev.plan{background:var(--accent-light);border-color:var(--accent)}.wev.hon{background:var(--green-bg);border-color:var(--green)}.wev.abs{background:var(--red-bg);border-color:var(--red)}.wev.ann{background:var(--muted-bg);border-color:var(--orange)}
.wempty{font-size:11px;color:#bbb;text-align:center;padding:14px 0}

/* MOIS */
.month{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.month-dow{display:grid;grid-template-columns:repeat(7,1fr);background:var(--alt);border-bottom:1px solid var(--border)}
.month-dow div{padding:9px;text-align:center;font-size:12px;font-weight:600;color:var(--muted)}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.mcell{min-height:96px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px;cursor:pointer;transition:.1s}
.mcell:hover{background:var(--alt)}
.mcell.out{background:#faf9f6;color:#bbb}
.mcell .dnum{font-size:13px;font-weight:600;margin-bottom:4px}
.mcell.today .dnum{background:var(--accent);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.pill{font-size:10.5px;border-radius:5px;padding:2px 6px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pill.plan{background:var(--accent-light);color:var(--accent)}.pill.hon{background:var(--green-bg);color:var(--green)}.pill.abs{background:var(--red-bg);color:var(--red)}.pill.ann{background:var(--muted-bg);color:var(--orange)}
.more{font-size:10px;color:var(--muted);font-weight:600}

/* modal détail / création */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:18px}
.ov.show{display:flex}
.modal{background:var(--surface);border-radius:14px;max-width:460px;width:100%;box-shadow:var(--shadow-lg);max-height:90vh;overflow:auto}
.modal-h{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-h h2{font-family:'DM Serif Display',serif;font-size:19px}.modal-h .x{background:none;border:none;font-size:24px;cursor:pointer;color:var(--muted)}
.modal-b{padding:22px}
.kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--alt);font-size:14px}
.kv b{color:var(--muted);font-weight:500}
.st-badge{font-size:12px;font-weight:700;padding:5px 13px;border-radius:14px}
.st-badge.plan{background:var(--accent-light);color:var(--accent)}.st-badge.hon{background:var(--green-bg);color:var(--green)}.st-badge.abs{background:var(--red-bg);color:var(--red)}.st-badge.ann{background:var(--muted-bg);color:var(--orange)}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}
.fg{margin-bottom:13px}.fg label{display:block;font-size:12.5px;font-weight:600;margin-bottom:5px}.fg .rq{color:var(--red)}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 11px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(120px);background:#1c1c1c;color:#fff;padding:12px 22px;border-radius:9px;font-size:14px;transition:.25s;z-index:200}#toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:920px){.week{grid-template-columns:1fr;gap:8px}.nav-day .lbl{min-width:150px;font-size:15px}}
</style>
</head>
<body>
<div class="hdr">
  <div class="b"><div class="ic">🗓️</div><div><h1>Agenda des rendez-vous</h1><small>MediCore · Planning patients</small></div></div>
  <div style="display:flex;gap:8px"><button class="btn btn-pri" onclick="openNew()">+ Rendez-vous</button><button class="btn btn-w" onclick="pull()">⟳ Sync</button></div>
</div>

<div class="toolbar">
  <div class="nav-day">
    <button onclick="shift(-1)">‹</button>
    <button class="btn btn-ghost" onclick="goToday()" style="height:34px">Aujourd'hui</button>
    <button onclick="shift(1)">›</button>
  </div>
  <div class="lbl" id="periodLbl">—</div>
  <div class="sp"></div>
  <select class="filt" id="filtService" onchange="render()"><option value="">Tous services</option></select>
  <select class="filt" id="filtMed" onchange="render()"><option value="">Tous médecins</option></select>
  <div class="views">
    <button data-v="jour" onclick="setView('jour')">Jour</button>
    <button data-v="semaine" class="on" onclick="setView('semaine')">Semaine</button>
    <button data-v="mois" onclick="setView('mois')">Mois</button>
  </div>
</div>

<div class="stats" id="stats"></div>
<div class="area" id="area"></div>

<!-- modal détail -->
<div class="ov" id="ovDetail"><div class="modal">
  <div class="modal-h"><h2>Rendez-vous</h2><button class="x" onclick="closeModal('ovDetail')">×</button></div>
  <div class="modal-b" id="detailBody"></div>
</div></div>

<!-- modal création -->
<div class="ov" id="ovNew"><div class="modal">
  <div class="modal-h"><h2>Nouveau rendez-vous</h2><button class="x" onclick="closeModal('ovNew')">×</button></div>
  <div class="modal-b">
    <div class="fg"><label>Patient <span class="rq">*</span></label>
      <input id="n_patient" list="patList" placeholder="Nom ou IPP — ou nouveau">
      <datalist id="patList"></datalist>
    </div>
    <div class="row2">
      <div class="fg"><label>Date <span class="rq">*</span></label><input type="date" id="n_date" onchange="checkNewConflict()"></div>
      <div class="fg"><label>Heure <span class="rq">*</span></label><input type="time" id="n_heure" value="09:00" onchange="checkNewConflict()"></div>
    </div>
    <div class="warn-line" id="n_warn"></div>
    <div class="row2">
      <div class="fg"><label>Service <span class="rq">*</span></label><select id="n_service" onchange="checkNewConflict()"></select></div>
      <div class="fg"><label>Médecin</label><input id="n_medecin" placeholder="optionnel" onchange="checkNewConflict()"></div>
    </div>
    <div class="fg"><label>Motif</label><textarea id="n_motif" rows="2" placeholder="Motif de consultation…"></textarea></div>
    <div class="actions"><button class="btn btn-pri" style="flex:1" onclick="createRdv()">Planifier</button></div>
  </div>
</div></div>

<div id="toast"></div>

<script>
const SUPABASE_URL='https://bjsgivzfarknjfdxhqth.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqc2dpdnpmYXJrbmpmZHhocXRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMDUzMDUsImV4cCI6MjA5Njg4MTMwNX0.e1Oa9y0BT3DXe6BZUpNLLbsm8uxEePbWjyWGiKcPhBc';
const SERVICES=['Médecine générale','Chirurgie','Maternité','Pédiatrie','Cardiologie','Imagerie','Laboratoire','Ophtalmologie','Dermatologie','Urgences'];
const HOURS=[];for(let h=7;h<=18;h++)HOURS.push(h);
const ST={Planifié:'plan',Honoré:'hon',Absent:'abs',Annulé:'ann'};
const SEUIL_CRENEAU=4; // RDV max par service / heure avant alerte
const JOURS=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const MOIS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

let view='semaine', cursor=new Date();

function load(s){try{const p=JSON.parse(localStorage.getItem('medicore_'+s)||'null');if(!p)return[];return Array.isArray(p)?p:(p.d||[]);}catch(e){return[];}}
function save(s,r){localStorage.setItem('medicore_'+s,JSON.stringify({_v:1,_ts:Date.now(),d:r}));}
function uid(p){return (p||'')+Date.now().toString(36).toUpperCase()+Math.random().toString(36).slice(2,4).toUpperCase();}
function esc(s){return (s||'').toString().replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function iso(d){return d.toISOString().slice(0,10);}
function sameDay(a,b){return iso(a)===iso(b);}
function mondayOf(d){const x=new Date(d);const day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);x.setHours(0,0,0,0);return x;}

async function sb(method,path,body){
  const r=await fetch(SUPABASE_URL+'/rest/v1/'+path,{method,headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':method==='PATCH'?'return=minimal':'return=representation'},body:body?JSON.stringify(body):undefined});
  if(!r.ok)throw new Error(await r.text());return method==='PATCH'?true:r.json();
}
async function pull(){
  try{const rows=await sb('GET','rdv?select=*&order=date.desc');
    const loc=load('rdv');const by={};loc.forEach(r=>by[r.id]=r);rows.forEach(r=>by[r.id]=Object.assign(by[r.id]||{},r));
    save('rdv',Object.values(by));toast('Sync — '+rows.length+' RDV');}catch(e){toast('Réseau indispo — local');}
  render();
}

// init selects
['filtService','n_service'].forEach(id=>{const el=document.getElementById(id);const base=id==='filtService'?'<option value="">Tous services</option>':'';el.innerHTML=base+SERVICES.map(s=>`<option>${s}</option>`).join('');});
function refreshMedFilter(){
  const meds=[...new Set(load('rdv').map(r=>r.medecin).filter(Boolean))].sort();
  const el=document.getElementById('filtMed');const cur=el.value;
  el.innerHTML='<option value="">Tous médecins</option>'+meds.map(m=>`<option>${esc(m)}</option>`).join('');el.value=cur;
}
function refreshPatList(){
  const pats=load('patients');
  document.getElementById('patList').innerHTML=pats.map(p=>`<option value="${esc(p.nom)} — ${esc(p.ipp||p.id)}">`).join('');
}

function filtered(){
  const fs=document.getElementById('filtService').value, fm=document.getElementById('filtMed').value;
  return load('rdv').filter(r=>(!fs||r.service===fs)&&(!fm||r.medecin===fm));
}
function evClass(r){return ST[r.statut]||'plan';}

// ── Détection de conflits ───────────────────────────────────────────
function conflitsMedecin(date,heure,medecin,excludeId){
  if(!medecin)return [];
  return load('rdv').filter(r=>r.id!==excludeId && r.statut!=='Annulé' && r.medecin===medecin && r.date===date && (r.heure||'')===(heure||''));
}
function chargeCreneau(date,heure,service,excludeId){
  return load('rdv').filter(r=>r.id!==excludeId && r.statut!=='Annulé' && r.service===service && r.date===date && (r.heure||'')===(heure||'')).length;
}
function collisionMap(rdvs){
  const m={};rdvs.forEach(r=>{if(r.statut==='Annulé'||!r.medecin)return;const k=r.medecin+'|'+r.date+'|'+(r.heure||'');m[k]=(m[k]||0)+1;});return m;
}
function estCollision(r,map){return r.medecin && map[r.medecin+'|'+r.date+'|'+(r.heure||'')]>1;}
function checkNewConflict(){
  const date=document.getElementById('n_date').value,heure=document.getElementById('n_heure').value;
  const service=document.getElementById('n_service').value,medecin=document.getElementById('n_medecin').value.trim();
  const w=document.getElementById('n_warn');let msg='';
  if(date&&heure&&medecin){const c=conflitsMedecin(date,heure,medecin,null);if(c.length)msg='⚠ '+medecin+' déjà pris à '+heure+' ('+esc(c[0].patient_nom)+')';}
  if(!msg&&date&&heure&&service){const ch=chargeCreneau(date,heure,service,null);if(ch>=SEUIL_CRENEAU)msg='⚠ Créneau '+service+' chargé : '+ch+' RDV à '+heure;}
  w.textContent=msg;w.classList.toggle('show',!!msg);
}

function setView(v){view=v;document.querySelectorAll('.views button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));render();}
function shift(n){if(view==='jour')cursor.setDate(cursor.getDate()+n);else if(view==='semaine')cursor.setDate(cursor.getDate()+7*n);else cursor.setMonth(cursor.getMonth()+n);render();}
function goToday(){cursor=new Date();render();}

function render(){
  refreshMedFilter();
  const all=filtered();
  // période label
  let lbl='';
  if(view==='jour')lbl=cursor.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  else if(view==='semaine'){const m=mondayOf(cursor);const e=new Date(m);e.setDate(m.getDate()+6);lbl=m.getDate()+' – '+e.getDate()+' '+MOIS[e.getMonth()]+' '+e.getFullYear();}
  else lbl=MOIS[cursor.getMonth()]+' '+cursor.getFullYear();
  document.getElementById('periodLbl').textContent=lbl;
  // stats sur la période visible
  const inPeriod=all.filter(r=>{const d=new Date(r.date+'T00:00');
    if(view==='jour')return sameDay(d,cursor);
    if(view==='semaine'){const m=mondayOf(cursor);const e=new Date(m);e.setDate(m.getDate()+7);return d>=m&&d<e;}
    return d.getMonth()===cursor.getMonth()&&d.getFullYear()===cursor.getFullYear();});
  const c=k=>inPeriod.filter(r=>r.statut===k).length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><span class="d dot-plan"></span><div><b>${c('Planifié')}</b><small>Planifiés</small></div></div>
    <div class="stat"><span class="d dot-hon"></span><div><b>${c('Honoré')}</b><small>Honorés</small></div></div>
    <div class="stat"><span class="d dot-abs"></span><div><b>${c('Absent')}</b><small>Absents</small></div></div>
    <div class="stat"><span class="d dot-ann"></span><div><b>${c('Annulé')}</b><small>Annulés</small></div></div>`;
  if(view==='jour')renderDay(all);else if(view==='semaine')renderWeek(all);else renderMonth(all);
}

function renderDay(all){
  const cmap=collisionMap(all);
  const day=all.filter(r=>sameDay(new Date(r.date+'T00:00'),cursor));
  const A=document.getElementById('area');
  A.innerHTML='<div class="day-grid">'+HOURS.map(h=>{
    const evs=day.filter(r=>parseInt((r.heure||'09:00').split(':')[0])===h).sort((a,b)=>(a.heure||'').localeCompare(b.heure||''));
    return `<div class="hour-row"><div class="hour-lbl">${String(h).padStart(2,'0')}:00</div><div class="hour-slot">${
      evs.map(r=>`<div class="ev ${evClass(r)}${estCollision(r,cmap)?' collide':''}" onclick="detail('${r.id}')"><b>${estCollision(r,cmap)?'⚠ ':''}${esc(r.heure||'')} · ${esc(r.patient_nom)}${r.origine==='portail'?'<span class="badge-p">portail</span>':''}</b><small>${esc(r.service)}${r.medecin?' · '+esc(r.medecin):''}</small></div>`).join('')||''
    }</div></div>`;
  }).join('')+'</div>';
}

function renderWeek(all){
  const cmap=collisionMap(all);
  const m=mondayOf(cursor);const A=document.getElementById('area');let cols='';
  for(let i=0;i<7;i++){const d=new Date(m);d.setDate(m.getDate()+i);
    const evs=all.filter(r=>sameDay(new Date(r.date+'T00:00'),d)).sort((a,b)=>(a.heure||'').localeCompare(b.heure||''));
    const today=sameDay(d,new Date());
    cols+=`<div class="wcol"><div class="wcol-h ${today?'today':''}"><b>${JOURS[i]}</b><small>${d.getDate()} ${MOIS[d.getMonth()].slice(0,4)}</small></div>
      <div class="wcol-body">${evs.length?evs.map(r=>`<div class="wev ${evClass(r)}${estCollision(r,cmap)?' collide':''}" onclick="detail('${r.id}')"><b>${estCollision(r,cmap)?'⚠ ':''}${esc(r.heure||'')} ${esc(r.patient_nom)}</b><small>${esc(r.service)}</small></div>`).join(''):'<div class="wempty">—</div>'}</div></div>`;
  }
  A.innerHTML='<div class="week">'+cols+'</div>';
}

function renderMonth(all){
  const cmap=collisionMap(all);
  const first=new Date(cursor.getFullYear(),cursor.getMonth(),1);
  const start=mondayOf(first);const A=document.getElementById('area');
  let cells='';
  for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);
    const out=d.getMonth()!==cursor.getMonth();const today=sameDay(d,new Date());
    const evs=all.filter(r=>sameDay(new Date(r.date+'T00:00'),d)).sort((a,b)=>(a.heure||'').localeCompare(b.heure||''));
    const shown=evs.slice(0,3).map(r=>`<div class="pill ${evClass(r)}${estCollision(r,cmap)?' collide':''}" onclick="event.stopPropagation();detail('${r.id}')">${estCollision(r,cmap)?'⚠':''}${esc(r.heure||'')} ${esc(r.patient_nom)}</div>`).join('');
    const more=evs.length>3?`<div class="more">+${evs.length-3} autre(s)</div>`:'';
    cells+=`<div class="mcell ${out?'out':''} ${today?'today':''}" onclick="cursor=new Date('${iso(d)}T00:00');setView('jour')"><div class="dnum">${d.getDate()}</div>${shown}${more}</div>`;
  }
  A.innerHTML='<div class="month"><div class="month-dow">'+JOURS.map(j=>`<div>${j}</div>`).join('')+'</div><div class="month-grid">'+cells+'</div></div>';
}

// détail + changement statut
function detail(id){
  const r=load('rdv').find(x=>x.id===id);if(!r)return;
  const cls=evClass(r);
  document.getElementById('detailBody').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <span class="st-badge ${cls}">${esc(r.statut)}</span>
      ${r.origine==='portail'?'<span style="font-size:11px;background:var(--accent2);color:#fff;padding:3px 10px;border-radius:12px">Demande portail</span>':''}
    </div>
    <div class="kv"><b>Patient</b><span>${esc(r.patient_nom)}</span></div>
    ${r.ipp?`<div class="kv"><b>IPP</b><span>${esc(r.ipp)}</span></div>`:''}
    <div class="kv"><b>Date</b><span>${esc(r.date)} à ${esc(r.heure||'')}</span></div>
    <div class="kv"><b>Service</b><span>${esc(r.service)}</span></div>
    <div class="kv"><b>Médecin</b><span>${esc(r.medecin||'Indifférent')}</span></div>
    ${r.motif?`<div class="kv"><b>Motif</b><span style="text-align:right;max-width:60%">${esc(r.motif)}</span></div>`:''}
    ${r.ref_portail?`<div class="kv"><b>Réf. portail</b><span>${esc(r.ref_portail)}</span></div>`:''}
    <div class="actions">
      <button class="btn" style="background:var(--green);color:#fff" onclick="setStatut('${id}','Honoré')">✓ Honoré</button>
      <button class="btn" style="background:var(--red-bg);color:var(--red)" onclick="setStatut('${id}','Absent')">Absent</button>
      <button class="btn btn-ghost" onclick="setStatut('${id}','Planifié')">↺ Replanifier</button>
      <button class="btn" style="background:var(--muted-bg);color:var(--orange)" onclick="setStatut('${id}','Annulé')">Annuler</button>
    </div>`;
  document.getElementById('ovDetail').classList.add('show');
}
async function setStatut(id,st){
  const rows=load('rdv');const r=rows.find(x=>x.id===id);if(!r)return;
  r.statut=st;r.maj_le=new Date().toISOString();save('rdv',rows);
  try{await sb('PATCH','rdv?id=eq.'+encodeURIComponent(id),{statut:st});}catch(e){}
  closeModal('ovDetail');toast('Statut → '+st);render();
}

// création manuelle
function openNew(){
  refreshPatList();
  document.getElementById('n_date').value=iso(cursor);
  document.getElementById('n_patient').value='';document.getElementById('n_medecin').value='';document.getElementById('n_motif').value='';
  document.getElementById('ovNew').classList.add('show');
}
async function createRdv(){
  const pv=document.getElementById('n_patient').value.trim();
  const date=document.getElementById('n_date').value,heure=document.getElementById('n_heure').value;
  const service=document.getElementById('n_service').value,medecin=document.getElementById('n_medecin').value.trim();
  if(!pv||!date||!heure||!service){toast('Patient, date, heure, service requis');return;}
  // anti-conflit
  const cMed=conflitsMedecin(date,heure,medecin,null);
  if(cMed.length && !confirm('⚠ '+medecin+' a déjà un RDV le '+date+' à '+heure+' ('+cMed[0].patient_nom+').\nForcer le double-booking ?'))return;
  const charge=chargeCreneau(date,heure,service,null);
  if(charge>=SEUIL_CRENEAU && !confirm('⚠ Créneau chargé : '+charge+' RDV sur '+service+' à '+heure+'.\nContinuer ?'))return;
  // résoudre patient (existant via " — IPP/id", sinon création légère)
  let nom=pv,ipp='',pid='';
  const pats=load('patients');
  if(pv.includes(' — ')){const key=pv.split(' — ').pop();const p=pats.find(x=>(x.ipp||x.id)===key);if(p){nom=p.nom;ipp=p.ipp||'';pid=p.id;}}
  if(!pid){const newId='P'+Date.now().toString().slice(-7);ipp='IPP-'+new Date().getFullYear()+'-'+Math.floor(1000+Math.random()*9000);
    pats.push({id:newId,ipp,nom,sexe:'',ddn:'',service,type:'Consultation',statut:'Actif',lit:'',medecin,motif:document.getElementById('n_motif').value,allergies:'',antecedents:'',comorbidites:'',groupe:'',assurance:'',tel:'',entree:null,source:'agenda'});
    save('patients',pats);pid=newId;}
  const rdv=load('rdv');
  const rec={id:uid('RDV-'),patient_id:pid,patient_nom:nom,ipp,service,medecin,date,heure,motif:document.getElementById('n_motif').value,statut:'Planifié',origine:'agenda',cree_le:new Date().toISOString()};
  rdv.push(rec);save('rdv',rdv);
  try{await sb('POST','rdv',[rec]);}catch(e){}
  closeModal('ovNew');toast('RDV planifié');render();
}
function closeModal(id){document.getElementById(id).classList.remove('show');}
document.querySelectorAll('.ov').forEach(o=>o.onclick=e=>{if(e.target===o)o.classList.remove('show');});

pull();
</script>
